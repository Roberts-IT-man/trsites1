<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trsites — Elite Web Solutions</title>
<link rel="icon" type="image/png" href="https://cdn.glitch.global/4985faea-5bdf-4c3a-8646-c8bb5ff99bf7/c6a2b510-ea06-40c6-a6b2-916fb403434a.image.png?v=1740822348539">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0a0a;--paper:#f5f0e8;--cream:#ede8dc;
  --accent:#c8472b;--muted:#9a9282;--line:rgba(10,10,10,0.12);
  --serif:'DM Serif Display',Georgia,serif;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);overflow-x:hidden;cursor:none}

body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:180px;pointer-events:none;z-index:9990;opacity:.45;
}

#cursor{
  width:10px;height:10px;background:var(--accent);border-radius:50%;
  position:fixed;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .25s,height .25s,background .25s;mix-blend-mode:multiply;
}
#cursor-ring{
  width:36px;height:36px;border:1.5px solid var(--ink);border-radius:50%;
  position:fixed;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s,border-color .3s;
}

#splash{
  position:fixed;inset:0;background:#04040f;
  z-index:8000;overflow:hidden;
  transition:opacity .9s ease,visibility .9s ease;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}

.star{
  position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{
  0%,100%{opacity:var(--lo,.2)}50%{opacity:var(--hi,.9)}
}

#atmosphere{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    #04040f 0%,#08103a 30%,#122060 50%,
    #1a4a8a 62%,#2878b8 72%,#4aaad4 82%,
    #7acce8 91%,#a8e4f8 100%
  );
  opacity:0;transition:opacity 2.8s ease;
}

#earth{
  position:absolute;bottom:-140%;left:50%;
  transform:translateX(-50%);
  width:240vw;height:240vw;border-radius:50%;
  background:
    radial-gradient(ellipse at 25% 25%, #5aaa7a 0%, #2a7a50 25%, #1a5a38 48%, #0d3a22 70%, #071a10 100%);
  box-shadow:
    inset -40px -40px 80px rgba(0,0,0,.45),
    0 0 100px rgba(80,180,255,.35),
    0 0 200px rgba(80,180,255,.12);
  opacity:0;
  transition:opacity 2.2s ease, bottom 4s cubic-bezier(.25,.46,.45,.94);
}
#earth::before{
  content:'';position:absolute;top:5%;left:10%;
  width:40%;height:14%;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,.22) 0%,transparent 70%);
}
#earth::after{
  content:'';position:absolute;top:22%;right:8%;
  width:30%;height:9%;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,.16) 0%,transparent 70%);
}
#earth.visible{opacity:1}
#earth.risen{bottom:-100%}

#ground{
  position:absolute;bottom:0;left:0;right:0;height:20%;
  background:linear-gradient(180deg,#182818 0%,#0e1a0e 100%);
  border-top:2px solid #2a4a2a;
  transition:transform 2.2s cubic-bezier(.4,0,.2,1);
}
#ground-glow{
  position:absolute;top:-20px;left:0;right:0;height:20px;
  background:linear-gradient(0deg,rgba(200,71,43,.3) 0%,transparent 100%);
  animation:groundGlow 1s ease-in-out infinite alternate;
  opacity:0;
}
@keyframes groundGlow{from{opacity:0}to{opacity:1}}

#ground-lines{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:repeating-linear-gradient(90deg,#3a6a3a 0px,#3a6a3a 40px,transparent 40px,transparent 80px);
}

#gantry-left,#gantry-right{
  position:absolute;bottom:20%;width:6px;
  background:linear-gradient(180deg,#444 0%,#333 100%);
  transform-origin:bottom center;
  transition:transform 1.2s cubic-bezier(.4,0,.2,1) .8s;
}
#gantry-left{height:180px;left:calc(50% - 52px)}
#gantry-right{height:180px;right:calc(50% - 52px)}
#gantry-left.retract{transform:rotate(-75deg)}
#gantry-right.retract{transform:rotate(75deg)}

#pad{
  position:absolute;bottom:20%;left:50%;transform:translateX(-50%);
  width:90px;height:16px;background:#555;border-radius:5px 5px 0 0;
}
#pad::before{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:14px;height:32px;background:#444;
}

#rocket-wrap{
  position:absolute;
  left:50%;
  bottom:calc(20% + 16px);
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  transform-origin:bottom center;
  will-change:transform,bottom,left;
}
#rocket-emoji{
  font-size:3.4rem;
  filter:drop-shadow(0 0 14px rgba(200,71,43,.6));
  display:block;
  transition:transform .5s ease;
  transform-origin:center center;
}

#exhaust{
  width:30px;display:flex;flex-direction:column;align-items:center;gap:2px;
  margin-top:-8px;opacity:0;transition:opacity .4s;
}
.flame{border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;animation:flicker .1s ease-in-out infinite alternate}
.f1{width:24px;height:32px;background:radial-gradient(ellipse,#fff 0%,#ffeb3b 30%,#ff9800 60%,transparent 100%)}
.f2{width:15px;height:22px;background:radial-gradient(ellipse,#fff 0%,#ffeb3b 40%,#ff5722 70%,transparent 100%)}
.f3{width:9px;height:14px;background:radial-gradient(ellipse,#fff 0%,#ffeb3b 50%,transparent 100%)}
@keyframes flicker{from{transform:scaleX(1) scaleY(1)}to{transform:scaleX(.82) scaleY(1.12)}}

.shockwave{
  position:fixed;border-radius:50%;
  border:2px solid rgba(255,160,50,.6);
  pointer-events:none;transform:translate(-50%,-50%);
  animation:shockExpand .8s ease-out forwards;
}
@keyframes shockExpand{
  0%{width:20px;height:20px;opacity:.9}
  100%{width:160px;height:160px;opacity:0}
}

.smoke{
  position:fixed;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(200,200,200,.65) 0%,rgba(140,140,140,0) 70%);
  animation:puff 1.6s ease-out forwards;
  transform:translate(-50%,-50%);
}
@keyframes puff{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.75}
  100%{transform:translate(-50%,-50%) scale(5);opacity:0}
}

#contrail-canvas{position:absolute;inset:0;pointer-events:none}

@keyframes shake{
  0%,100%{transform:none}
  15%{transform:translate(-4px,3px) rotate(-.4deg)}
  30%{transform:translate(5px,-3px) rotate(.3deg)}
  45%{transform:translate(-3px,5px) rotate(-.5deg)}
  60%{transform:translate(4px,-2px) rotate(.4deg)}
  75%{transform:translate(-5px,4px) rotate(-.3deg)}
  90%{transform:translate(3px,-4px) rotate(.2deg)}
}
#splash.shaking{animation:shake .09s ease-in-out infinite}

#splash-title{
  position:absolute;top:45%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;z-index:12;
  opacity:0;transition:opacity 1.4s ease;
}
#splash-title h1{
  font-family:var(--serif);
  font-size:clamp(4.5rem,13vw,10rem);
  color:#fff;letter-spacing:-.03em;line-height:1;
  text-shadow:0 0 50px rgba(120,210,255,.7),0 0 100px rgba(120,210,255,.35),0 3px 0 rgba(0,0,0,.5);
}
#splash-title p{
  font-family:var(--mono);font-size:.75rem;
  letter-spacing:.22em;text-transform:uppercase;
  color:rgba(210,245,255,.65);margin-top:.85rem;
}
#splash-title.visible{opacity:1}

#countdown{
  position:absolute;bottom:4rem;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:.7rem;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(255,255,255,.4);
  transition:opacity .4s;z-index:8100;
}

#skip-btn{
  position:absolute;bottom:1.75rem;right:2rem;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.15em;
  text-transform:uppercase;color:rgba(255,255,255,.3);
  background:none;border:1px solid rgba(255,255,255,.12);
  padding:.45rem .9rem;cursor:none;z-index:8200;
  transition:color .2s,border-color .2s;
}
#skip-btn:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.35)}

#progress-bar{
  position:absolute;bottom:0;left:0;height:2px;
  background:var(--accent);width:0%;
  transition:width .15s linear;z-index:8100;
}

.page-wipe{
  position:fixed;inset:0;background:var(--ink);
  z-index:400;transform:translateY(100%);pointer-events:none;
}

nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.5rem 3rem;
}
.nav-logo{
  font-family:var(--serif);font-size:1.4rem;
  color:var(--ink);text-decoration:none;letter-spacing:-.02em;
}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);text-decoration:none;
  transition:color .2s;position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-3px;left:0;
  width:0;height:1px;background:var(--accent);transition:width .3s;
}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}

.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:4px}
.hamburger span{display:block;width:24px;height:1.5px;background:var(--ink);transition:transform .3s,opacity .3s}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

.mobile-menu{
  position:fixed;inset:0;background:var(--ink);z-index:490;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2.5rem;
  opacity:0;visibility:hidden;transition:opacity .4s,visibility .4s;
}
.mobile-menu.open{opacity:1;visibility:visible}
.mobile-menu a{
  font-family:var(--serif);font-size:clamp(2.5rem,8vw,5rem);
  color:var(--paper);text-decoration:none;transition:color .2s;
}
.mobile-menu a:hover{color:var(--accent)}

@media(max-width:768px){
  .hamburger{display:flex}
  .nav-links{display:none}
  nav{padding:1.2rem 1.5rem}
}

section{display:none;min-height:100vh}
section.active{display:block}

#home{padding-top:8rem}
.home-hero{
  padding:0 3rem;display:grid;
  grid-template-columns:1fr 1fr;gap:4rem;
  align-items:end;max-width:1400px;margin:0 auto;
}
.hero-eyebrow{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem;
}
.hero-eyebrow::before{content:'';display:block;width:2rem;height:1px;background:var(--accent)}
.hero-title{
  font-family:var(--serif);font-size:clamp(3.5rem,6vw,7rem);
  line-height:1.02;letter-spacing:-.03em;color:var(--ink);
}
.hero-title em{font-style:italic;color:var(--accent)}
.hero-desc{font-size:1.05rem;line-height:1.75;color:var(--muted);max-width:38ch;margin-bottom:2.5rem}

.btn-primary{
  display:inline-flex;align-items:center;gap:.75rem;
  background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;
  text-transform:uppercase;padding:.9rem 1.8rem;
  border:none;cursor:none;transition:gap .25s;
  position:relative;overflow:hidden;text-decoration:none;
}
.btn-primary::before{
  content:'';position:absolute;inset:0;background:var(--accent);
  transform:translateX(-102%);transition:transform .4s cubic-bezier(.76,0,.24,1);
}
.btn-primary:hover::before{transform:translateX(0)}
.btn-primary span{position:relative;z-index:1}
.btn-primary:hover{gap:1.25rem}

.marquee-wrap{
  overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:1.25rem 0;background:var(--ink);margin-top:5rem;
}
.marquee-track{display:flex;gap:3rem;animation:marquee 22s linear infinite;white-space:nowrap}
.marquee-item{font-family:var(--mono);font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--paper);opacity:.5;flex-shrink:0}
.marquee-item.ac{color:var(--accent);opacity:1}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.services{padding:5rem 3rem;max-width:1400px;margin:0 auto}
.section-label{
  font-family:var(--mono);font-size:.65rem;letter-spacing:.25em;
  text-transform:uppercase;color:var(--muted);margin-bottom:3rem;
  display:flex;align-items:center;gap:1rem;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)}
.service-item{
  padding:2.5rem 2rem 2.5rem 0;border-right:1px solid var(--line);
  position:relative;overflow:hidden;
}
.service-item:last-child{border-right:none;padding-right:0}
.service-item:not(:first-child){padding-left:2rem}
.service-num{font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:.15em;margin-bottom:1.5rem}
.service-name{font-family:var(--serif);font-size:1.6rem;line-height:1.15;letter-spacing:-.02em;margin-bottom:1rem;color:var(--ink)}
.service-desc{font-size:.875rem;line-height:1.65;color:var(--muted)}
.service-hover-line{position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--accent);transition:width .5s cubic-bezier(.76,0,.24,1)}
.service-item:hover .service-hover-line{width:100%}

#about{padding-top:8rem}
.about-wrap{max-width:1400px;margin:0 auto;padding:0 3rem 5rem}
.about-header{
  display:grid;grid-template-columns:1fr 1.5fr;gap:6rem;
  align-items:start;margin-bottom:6rem;
  padding-bottom:5rem;border-bottom:1px solid var(--line);
}
.about-title{font-family:var(--serif);font-size:clamp(3rem,5vw,5.5rem);line-height:1.05;letter-spacing:-.03em}
.about-body p{font-size:1.05rem;line-height:1.75;color:var(--muted);margin-bottom:1.5rem}
.process-grid{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line)}
.process-card{padding:3rem 2.5rem;border-right:1px solid var(--line);position:relative;transition:background .3s}
.process-card:last-child{border-right:none}
.process-card:hover{background:var(--cream)}
.process-num{font-family:var(--serif);font-size:3rem;color:rgba(10,10,10,.08);line-height:1;margin-bottom:1.5rem}
.process-title{font-family:var(--serif);font-size:1.5rem;letter-spacing:-.02em;margin-bottom:.75rem}
.process-desc{font-size:.875rem;line-height:1.65;color:var(--muted)}

#projects{padding-top:8rem}
.work-wrap{max-width:1400px;margin:0 auto;padding:0 3rem 5rem}
.work-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4rem;padding-bottom:2rem;border-bottom:1px solid var(--line)}
.work-title{font-family:var(--serif);font-size:clamp(3rem,5vw,5.5rem);letter-spacing:-.03em;line-height:1}
.work-count{font-family:var(--mono);font-size:.7rem;letter-spacing:.15em;color:var(--muted)}
.work-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:35vh;gap:1.5rem;border:1px dashed var(--line);padding:5rem}
.work-empty-icon{font-size:2.5rem;opacity:.22}
.work-empty p{font-family:var(--mono);font-size:.75rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}

#contact{padding-top:8rem}
.contact-wrap{max-width:1400px;margin:0 auto;padding:0 3rem 5rem;display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:start}
.contact-title{font-family:var(--serif);font-size:clamp(3rem,5vw,5.5rem);letter-spacing:-.03em;line-height:1.05;margin-bottom:2rem}
.contact-left p{font-size:1rem;line-height:1.7;color:var(--muted);max-width:42ch}
.contact-detail{margin-top:3.5rem;border-top:1px solid var(--line);padding-top:2.5rem}
.contact-detail-label{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.contact-email{
  font-family:var(--serif);font-size:1.4rem;letter-spacing:-.02em;
  color:var(--ink);text-decoration:none;position:relative;display:inline-block;
}
.contact-email::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .4s}
.contact-email:hover::after{transform:scaleX(1)}
.info-block{background:var(--cream);border:1px solid var(--line);padding:3rem}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:1.25rem 0;border-bottom:1px solid var(--line)}
.info-row:last-child{border-bottom:none}
.info-key{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.info-val{font-family:var(--sans);font-size:.875rem;font-weight:700;color:var(--ink)}

footer{border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:1.75rem 3rem}
footer p{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}

.reveal{opacity:0;transform:translateY(28px);transition:opacity .75s ease,transform .75s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.rd1{transition-delay:.12s}.rd2{transition-delay:.24s}.rd3{transition-delay:.36s}

@media(max-width:900px){
  .home-hero{grid-template-columns:1fr;gap:2rem;padding:0 1.5rem}
  .services{padding:3rem 1.5rem}
  .services-grid{grid-template-columns:1fr}
  .service-item{border-right:none;border-bottom:1px solid var(--line);padding:2rem 0 !important}
  .service-item:last-child{border-bottom:none}
  .about-wrap,.work-wrap{padding:0 1.5rem 3rem}
  .about-header{grid-template-columns:1fr;gap:2rem;margin-bottom:3rem;padding-bottom:3rem}
  .process-grid{grid-template-columns:1fr}
  .process-card{border-right:none;border-bottom:1px solid var(--line)}
  .process-card:last-child{border-bottom:none}
  .contact-wrap{grid-template-columns:1fr;gap:3rem;padding:0 1.5rem 3rem}
  .work-header{flex-direction:column;gap:.5rem}
  footer{padding:1.5rem;flex-direction:column;gap:.5rem;text-align:center}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="page-wipe" id="page-wipe"></div>

<div id="splash">
  <div id="stars-container"></div>
  <canvas id="contrail-canvas"></canvas>
  <div id="atmosphere"></div>
  <div id="earth"></div>

  <div id="splash-title">
    <h1>trsites</h1>
    <p>Secure &nbsp;·&nbsp; Stable &nbsp;·&nbsp; Fast</p>
  </div>

  <div id="ground">
    <div id="ground-glow"></div>
    <div id="ground-lines"></div>
  </div>

  <div id="gantry-left"></div>
  <div id="gantry-right"></div>
  <div id="pad"></div>

  <div id="rocket-wrap">
    <div id="rocket-emoji">🚀</div>
    <div id="exhaust">
      <div class="flame f1"></div>
      <div class="flame f2"></div>
      <div class="flame f3"></div>
    </div>
  </div>

  <div id="countdown">T-3 ... Ignition sequence start</div>
  <div id="progress-bar"></div>
  <button id="skip-btn" onclick="skipCutscene()">Skip intro ↓</button>
</div>

<div class="mobile-menu" id="mobile-menu">
  <a href="#home" onclick="showPage('home');closeMobile()">Home</a>
  <a href="#about" onclick="showPage('about');closeMobile()">About</a>
  <a href="#projects" onclick="showPage('projects');closeMobile()">Work</a>
  <a href="#contact" onclick="showPage('contact');closeMobile()">Contact</a>
</div>

<nav>
  <a href="#home" class="nav-logo" onclick="showPage('home')">trsites</a>
  <ul class="nav-links">
    <li><a href="#home" data-page="home" class="nav-link active" onclick="showPage('home')">Home</a></li>
    <li><a href="#about" data-page="about" class="nav-link" onclick="showPage('about')">About</a></li>
